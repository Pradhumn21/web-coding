<html>
    <head>
        <title>calculator</title>
    </head>
    <body>
<input type="number" id="num1" placeholder="enter first number">&nbsp;
<input type="number" id="num2" placeholder="enter second number"><br>
<br>
<button onclick="add()">add</button>&nbsp;
<button onclick="subtract()">subtract</button>&nbsp;
<button onclick="multiply()">multiply</button>&nbsp;
<button onclick="divide()">divide</button>
    </body>
    <script>
        let input1 = document.getElementById("num1")
        let input2 = document.getElementById("num2")
        
function add(){
    let result1 = +input1.value + +input2.value
    alert(result1)
}

function subtract(){
    let result2 = input1.value - input2.value
    alert(result2)
}

function multiply(){
    let result3 = input1.value * input2.value
    alert(result3)
}

function divide(){
    let result4 = input1.value / input2.value
    alert(result4)
}
    </script>
</html>
